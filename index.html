<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurnUp | اشتعل باللياقة</title>
    <style>
        :root {
            --dark-blue: #0a192f;
            --orange: #ff6b00;
            --white: #ffffff;
            --gray: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-blue);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border-top: 5px solid var(--orange);
        }

        h1 {
            text-align: center;
            color: var(--orange);
            font-size: 2.5rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-toggle {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
        }

        .form-toggle button {
            background: none;
            border: none;
            color: var(--gray);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 10px;
            transition: 0.3s;
        }

        .form-toggle button.active {
            color: var(--orange);
            border-bottom: 2px solid var(--orange);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input, select {
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #1e293b;
            background: #1e293b;
            color: white;
            outline: none;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--orange);
        }

        button.main-btn {
            background: var(--orange);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        button.main-btn:hover {
            background: #e65a00;
            transform: translateY(-2px);
        }

        .hidden { display: none; }

        .message {
            text-align: center;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }

        .success { background: #059669; color: white; }
    </style>
</head>
<body>

<div class="container">
    <h1>BurnUp</h1>
    
    <div class="form-toggle">
        <button id="toggleLogin" onclick="showLogin()">تسجيل الدخول</button>
        <button id="toggleSignup" class="active" onclick="showSignup()">إنشاء حساب</button>
    </div>

    <form id="signupForm">
        <div class="input-group">
            <input type="text" placeholder="الاسم الأول" required id="firstName">
            <input type="text" placeholder="الاسم الأخير" required id="lastName">
        </div>
        <input type="text" placeholder="مكان التمرين (جيم / منزل)" required id="location">
        <select id="level">
            <option value="">مستوى التقدم</option>
            <option value="beginner">مبتدئ</option>
            <option value="intermediate">متوسط</option>
            <option value="advanced">محترف</option>
        </select>
        <div class="input-group">
            <input type="number" placeholder="الطول (سم)" required id="height">
            <input type="number" placeholder="الوزن (كجم)" required id="weight">
        </div>
        <input type="tel" placeholder="رقم التلفون" required id="phone">
        <input type="password" placeholder="كلمة السر" required id="password">
        <button type="submit" class="main-btn">ابدأ رحلتك الآن</button>
    </form>

    <form id="loginForm" class="hidden">
        <input type="tel" placeholder="رقم التلفون" required id="loginPhone">
        <input type="password" placeholder="كلمة السر" required id="loginPassword">
        <button type="submit" class="main-btn">تسجيل دخول</button>
    </form>

    <div id="msg" class="message success"></div>
</div>

<script>
    const signupForm = document.getElementById('signupForm');
    const loginForm = document.getElementById('loginForm');
    const msgDiv = document.getElementById('msg');

    function showLogin() {
        signupForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        document.getElementById('toggleLogin').classList.add('active');
        document.getElementById('toggleSignup').classList.remove('active');
        msgDiv.style.display = 'none';
    }

    function showSignup() {
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        document.getElementById('toggleSignup').classList.add('active');
        document.getElementById('toggleLogin').classList.remove('active');
        msgDiv.style.display = 'none';
    }

    // محاكاة حفظ البيانات
    signupForm.onsubmit = (e) => {
        e.preventDefault();
        msgDiv.innerText = "لقد تم حفظ بياناتك بنجاح في BurnUp!";
        msgDiv.style.display = 'block';
        signupForm.reset();
    };

    // محاكاة تسجيل الدخول
    loginForm.onsubmit = (e) => {
        e.preventDefault();
        msgDiv.innerText = "لقد تم تسجيل الدخول بهذا الحساب. جاري دخلك لصفحتك الشخصية...";
        msgDiv.style.display = 'block';
        
        // هنا ممكن توجهه لصفحة الداشبورد
        // setTimeout(() => { window.location.href = "profile.html"; }, 2000);
    };
</script>

</body>
</html>
