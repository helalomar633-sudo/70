<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurnUp | اشتعل باللياقة</title>
    <style>
        :root {
            --primary: #ff6b00;
            --primary-hover: #e65a00;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 0.2rem;
            font-weight: 800;
        }

        .subtitle {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .form-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .form-toggle button {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 10px;
            border-radius: 12px;
            transition: 0.3s;
            font-weight: 600;
        }

        .form-toggle button.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        input, select {
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid transparent;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: 0.3s ease;
            font-size: 0.9rem;
        }

        /* إضافة مساحة لزر "عرض" كلمة السر */
        input[type="password"], input[type="text"] {
            padding-left: 50px; 
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1);
        }

        .phone-container {
            display: flex;
            gap: 8px;
            direction: ltr;
        }

        .country-code {
            width: 110px;
            padding: 12px 5px;
        }

        .toggle-password {
            position: absolute;
            left: 10px;
            cursor: pointer;
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: bold;
            user-select: none;
            background: rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .main-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .main-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .hidden { display: none; }

        .message {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.85rem;
            display: none;
        }

        .msg-error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); }
        .msg-success { background: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h1>BurnUp</h1>
    <p class="subtitle">اشعل طاقتك وابدأ التغيير اليوم</p>
    
    <div class="form-toggle">
        <button id="toggleSignup" class="active" onclick="showSignup()">إنشاء حساب</button>
        <button id="toggleLogin" onclick="showLogin()">تسجيل الدخول</button>
    </div>

    <form id="signupForm">
        <div class="input-row">
            <input type="text" placeholder="الاسم الأول" required id="firstName">
            <input type="text" placeholder="الاسم الأخير" required id="lastName">
        </div>
        
        <select id="location" required>
            <option value="" disabled selected>مكان التمرين المفصل</option>
            <option value="gym">النادي الرياضي (Gym)</option>
            <option value="home">المنزل (Home)</option>
            <option value="outdoor">مساحة مفتوحة (Outdoor)</option>
        </select>

        <select id="level" required>
            <option value="" disabled selected>مستوى اللياقة</option>
            <option value="beginner">مبتدئ</option>
            <option value="intermediate">متوسط</option>
            <option value="advanced">محترف</option>
        </select>

        <div class="input-row">
            <input type="number" placeholder="الطول (سم)" required id="height">
            <input type="number" placeholder="الوزن (كجم)" required id="weight">
        </div>

        <div class="phone-container">
            <select class="country-code" id="countryCode">
                <option value="+20">🇪🇬 +20</option>
                <option value="+966">🇸🇦 +966</option>
                <option value="+971">🇦🇪 +971</option>
            </select>
            <input type="tel" placeholder="رقم التلفون" required id="phone" style="direction: rtl;">
        </div>

        <div class="input-group">
            <input type="password" placeholder="كلمة السر" required id="password">
            <span class="toggle-password" onclick="togglePass('password')">عرض</span>
        </div>

        <button type="submit" class="main-btn">ابدأ رحلتك الآن</button>
    </form>

    <form id="loginForm" class="hidden">
        <div class="phone-container">
            <select class="country-code" id="loginCountryCode">
                <option value="+20">🇪🇬 +20</option>
                <option value="+966">🇸🇦 +966</option>
            </select>
            <input type="tel" placeholder="رقم التلفون" required id="loginPhone" style="direction: rtl;">
        </div>
        
        <div class="input-group">
            <input type="password" placeholder="كلمة السر" required id="loginPassword">
            <span class="toggle-password" onclick="togglePass('loginPassword')">عرض</span>
        </div>
        
        <button type="submit" class="main-btn">دخول</button>
    </form>

    <div id="msg" class="message"></div>
</div>

<script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

<script>
    // إعدادات مشروعك BurnUp من الصورة
    const firebaseConfig = {
        apiKey: "AIzaSyBuArEPqytd-MBvtYPbg rnlAIZdbhcqmGg",
        authDomain: "burnup-832f1.firebaseapp.com",
        projectId: "burnup-832f1",
        storageBucket: "burnup-832f1.appspot.com",
        messagingSenderId: "936443662340",
        appId: "1:936443662340:web:9bfa9933f3041bebda6551",
        measurementId: "G-WCYMGBQJ98"
    };

    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // --- الدوال الأساسية للواجهة ---
    const signupForm = document.getElementById('signupForm');
    const loginForm = document.getElementById('loginForm');
    const msgDiv = document.getElementById('msg');

    function displayMessage(text, type) {
        msgDiv.innerText = text;
        msgDiv.style.display = 'block';
        msgDiv.className = 'message ' + (type === 'error' ? 'msg-error' : 'msg-success');
    }

    // --- منطق إنشاء الحساب (Signup) ---
    signupForm.onsubmit = async (e) => {
        e.preventDefault();
        
        const phone = document.getElementById('phone').value;
        const email = phone + "@burnup.com"; // تحويل الهاتف لإيميل وهمي
        const password = document.getElementById('password').value;
        
        try {
            // 1. إنشاء الحساب في نظام الحماية
            const userCredential = await auth.createUserWithEmailAndPassword(email, password);
            const user = userCredential.user;

            // 2. حفظ البيانات الشخصية في قاعدة البيانات السحابية
            await db.collection("users").doc(user.uid).set({
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                height: document.getElementById('height').value,
                weight: document.getElementById('weight').value,
                level: document.getElementById('level').value,
                location: document.getElementById('location').value,
                phone: phone,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            displayMessage("تم إنشاء حسابك السحابي بنجاح! جاري التحويل...", "success");
            setTimeout(() => { location.reload(); }, 2000); 

        } catch (error) {
            let errorMsg = "حدث خطأ أثناء التسجيل";
            if (error.code === 'auth/email-already-in-use') errorMsg = "هذا الرقم مسجل بالفعل!";
            displayMessage(errorMsg, "error");
        }
    };

    // --- منطق تسجيل الدخول (Login) ---
    loginForm.onsubmit = async (e) => {
        e.preventDefault();
        const phone = document.getElementById('loginPhone').value;
        const email = phone + "@burnup.com";
        const password = document.getElementById('loginPassword').value;

        try {
            await auth.signInWithEmailAndPassword(email, password);
            displayMessage("تم تسجيل الدخول بنجاح! أهلاً بك في BurnUp", "success");
            // هنا يمكنك توجيه المستخدم لصفحة التمارين
        } catch (error) {
            displayMessage("خطأ في الرقم أو كلمة السر", "error");
        }
    };
</script>
</body>
</html>
