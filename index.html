<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurnUp - Fitness Station</title>
    <style>
        :root {
            --dark-blue: #0a192f;
            --bright-orange: #ff6b00;
            --text-white: #e6f1ff;
            --soft-blue: #112240;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-blue);
            color: var(--text-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--soft-blue);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border-top: 5px solid var(--bright-orange);
        }

        h1 {
            text-align: center;
            color: var(--bright-orange);
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .input-group {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #233554;
            background-color: var(--dark-blue);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus {
            border-color: var(--bright-orange);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--bright-orange);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #e65c00;
            transform: translateY(-2px);
        }

        .toggle-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }

        .toggle-link span {
            color: var(--bright-orange);
            cursor: pointer;
            text-decoration: underline;
        }

        #userPanel {
            text-align: center;
            display: none;
        }

        .success-msg {
            background: #1d3331;
            color: #4ade80;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>BurnUp</h1>
        
        <div id="msgBox" class="success-msg"></div>

        <div id="registerSection" class="form-section active">
            <div class="grid">
                <div class="input-group">
                    <label>الاسم الأول</label>
                    <input type="text" id="fname" placeholder="أحمد">
                </div>
                <div class="input-group">
                    <label>الاسم الأخير</label>
                    <input type="text" id="lname" placeholder="علي">
                </div>
            </div>

            <div class="input-group">
                <label>رقم الهاتف</label>
                <input type="tel" id="regPhone" placeholder="01xxxxxxxxx">
            </div>

            <div class="input-group">
                <label>مكان التمرين</label>
                <select id="location">
                    <option value="gym">الجيم (Gym)</option>
                    <option value="home">المنزل</option>
                </select>
            </div>

            <div class="input-group">
                <label>مستوى التقدم</label>
                <select id="level">
                    <option value="beginner">مبتدئ</option>
                    <option value="intermediate">متوسط</option>
                    <option value="advanced">متقدم</option>
                </select>
            </div>

            <div class="grid">
                <div class="input-group">
                    <label>الطول (سم)</label>
                    <input type="number" id="height" placeholder="180">
                </div>
                <div class="input-group">
                    <label>الوزن (كجم)</label>
                    <input type="number" id="weight" placeholder="80">
                </div>
            </div>

            <div class="input-group">
                <label>كلمة السر</label>
                <input type="password" id="regPass">
            </div>

            <button onclick="register()">إنشاء حساب</button>
            <div class="toggle-link">لديك حساب بالفعل؟ <span onclick="showLogin()">تسجيل الدخول</span></div>
        </div>

        <div id="loginSection" class="form-section">
            <div class="input-group">
                <label>رقم الهاتف</label>
                <input type="tel" id="loginPhone" placeholder="01xxxxxxxxx">
            </div>
            <div class="input-group">
                <label>كلمة السر</label>
                <input type="password" id="loginPass">
            </div>
            <button onclick="login()">دخول</button>
            <div class="toggle-link">ليس لديك حساب؟ <span onclick="showRegister()">إنشاء حساب جديد</span></div>
        </div>

        <div id="userPanel" class="form-section">
            <h2 id="welcomeMsg"></h2>
            <p>مرحباً بك في رحلة التغيير الخاصة بك.</p>
            <button onclick="location.reload()" style="background: #233554;">تسجيل الخروج</button>
        </div>
    </div>

    <script>
        // محاكاة قاعدة بيانات بسيطة في المتصفح
        let db = JSON.parse(localStorage.getItem('users')) || [];

        function showLogin() {
            document.getElementById('registerSection').classList.remove('active');
            document.getElementById('loginSection').classList.add('active');
        }

        function showRegister() {
            document.getElementById('loginSection').classList.remove('active');
            document.getElementById('registerSection').classList.add('active');
        }

        function register() {
            const user = {
                fname: document.getElementById('fname').value,
                lname: document.getElementById('lname').value,
                phone: document.getElementById('regPhone').value,
                pass: document.getElementById('regPass').value
            };

            if(user.fname && user.phone && user.pass) {
                db.push(user);
                localStorage.setItem('users', JSON.stringify(db));
                
                const msg = document.getElementById('msgBox');
                msg.innerText = "لقد تم حفظ بياناتك بنجاح!";
                msg.style.display = "block";
                
                setTimeout(() => {
                    msg.style.display = "none";
                    showLogin();
                }, 2000);
            } else {
                alert("يرجى ملء البيانات الأساسية");
            }
        }

        function login() {
            const phone = document.getElementById('loginPhone').value;
            const pass = document.getElementById('loginPass').value;

            const foundUser = db.find(u => u.phone === phone && u.pass === pass);

            if(foundUser) {
                const msg = document.getElementById('msgBox');
                msg.innerText = "لقد تم تسجيل الدخول بهذا الحساب";
                msg.style.display = "block";

                setTimeout(() => {
                    msg.style.display = "none";
                    document.getElementById('loginSection').classList.remove('active');
                    document.getElementById('userPanel').classList.add('active');
                    document.getElementById('welcomeMsg').innerText = "كابتن " + foundUser.fname;
                }, 1500);
            } else {
                alert("خطأ في رقم الهاتف أو كلمة السر");
            }
        }
    </script>
</body>
</html>
