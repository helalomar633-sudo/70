<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BurnUp | اشتعل باللياقة</title>
    <style>
        :root {
            --primary: #ff6b00;
            --primary-hover: #e65a00;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
            --success: #22c55e;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e293b, #0f172a);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 2.2rem;
            margin-bottom: 0.2rem;
            font-weight: 800;
        }

        .subtitle {
            text-align: center;
            color: var(--text-dim);
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .form-toggle {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .form-toggle button {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 0.9rem;
            padding: 10px;
            border-radius: 12px;
            transition: 0.3s;
            font-weight: 600;
        }

        .form-toggle button.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 0, 0.3);
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-row {
            display: flex;
            gap: 10px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        input, select {
            padding: 12px 15px;
            border-radius: 12px;
            border: 2px solid transparent;
            background: rgba(15, 23, 42, 0.8);
            color: white;
            outline: none;
            width: 100%;
            box-sizing: border-box;
            transition: 0.3s ease;
            font-size: 0.9rem;
        }

        /* إضافة مساحة لزر "عرض" كلمة السر */
        input[type="password"], input[type="text"] {
            padding-left: 50px; 
        }

        input:focus, select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 107, 0, 0.1);
        }

        .phone-container {
            display: flex;
            gap: 8px;
            direction: ltr;
        }

        .country-code {
            width: 110px;
            padding: 12px 5px;
        }

        .toggle-password {
            position: absolute;
            left: 10px;
            cursor: pointer;
            color: var(--primary);
            font-size: 0.75rem;
            font-weight: bold;
            user-select: none;
            background: rgba(255,255,255,0.1);
            padding: 4px 8px;
            border-radius: 6px;
        }

        .main-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .main-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .hidden { display: none; }

        .message {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.85rem;
            display: none;
        }

        .msg-error { background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid var(--error); }
        .msg-success { background: rgba(34, 197, 94, 0.1); color: var(--success); border: 1px solid var(--success); }
    </style>
</head>
<body>

<div class="container">
    <h1>BurnUp</h1>
    <p class="subtitle">اشعل طاقتك وابدأ التغيير اليوم</p>
    
    <div class="form-toggle">
        <button id="toggleSignup" class="active" onclick="showSignup()">إنشاء حساب</button>
        <button id="toggleLogin" onclick="showLogin()">تسجيل الدخول</button>
    </div>

    <form id="signupForm">
        <div class="input-row">
            <input type="text" placeholder="الاسم الأول" required id="firstName">
            <input type="text" placeholder="الاسم الأخير" required id="lastName">
        </div>
        
        <select id="location" required>
            <option value="" disabled selected>مكان التمرين المفصل</option>
            <option value="gym">النادي الرياضي (Gym)</option>
            <option value="home">المنزل (Home)</option>
            <option value="outdoor">مساحة مفتوحة (Outdoor)</option>
        </select>

        <select id="level" required>
            <option value="" disabled selected>مستوى اللياقة</option>
            <option value="beginner">مبتدئ</option>
            <option value="intermediate">متوسط</option>
            <option value="advanced">محترف</option>
        </select>

        <div class="input-row">
            <input type="number" placeholder="الطول (سم)" required id="height">
            <input type="number" placeholder="الوزن (كجم)" required id="weight">
        </div>

        <div class="phone-container">
            <select class="country-code" id="countryCode">
                <option value="+20">🇪🇬 +20</option>
                <option value="+966">🇸🇦 +966</option>
                <option value="+971">🇦🇪 +971</option>
            </select>
            <input type="tel" placeholder="رقم التلفون" required id="phone" style="direction: rtl;">
        </div>

        <div class="input-group">
            <input type="password" placeholder="كلمة السر" required id="password">
            <span class="toggle-password" onclick="togglePass('password')">عرض</span>
        </div>

        <button type="submit" class="main-btn">ابدأ رحلتك الآن</button>
    </form>

    <form id="loginForm" class="hidden">
        <div class="phone-container">
            <select class="country-code" id="loginCountryCode">
                <option value="+20">🇪🇬 +20</option>
                <option value="+966">🇸🇦 +966</option>
            </select>
            <input type="tel" placeholder="رقم التلفون" required id="loginPhone" style="direction: rtl;">
        </div>
        
        <div class="input-group">
            <input type="password" placeholder="كلمة السر" required id="loginPassword">
            <span class="toggle-password" onclick="togglePass('loginPassword')">عرض</span>
        </div>
        
        <button type="submit" class="main-btn">دخول</button>
    </form>

    <div id="msg" class="message"></div>
</div>

<script>
    const signupForm = document.getElementById('signupForm');
    const loginForm = document.getElementById('loginForm');
    const msgDiv = document.getElementById('msg');

    function togglePass(id) {
        const input = document.getElementById(id);
        const btn = input.nextElementSibling;
        if (input.type === "password") {
            input.type = "text";
            btn.innerText = "إخفاء";
        } else {
            input.type = "password";
            btn.innerText = "عرض";
        }
    }

    function showLogin() {
        signupForm.classList.add('hidden');
        loginForm.classList.remove('hidden');
        document.getElementById('toggleLogin').classList.add('active');
        document.getElementById('toggleSignup').classList.remove('active');
        hideMsg();
    }

    function showSignup() {
        loginForm.classList.add('hidden');
        signupForm.classList.remove('hidden');
        document.getElementById('toggleSignup').classList.add('active');
        document.getElementById('toggleLogin').classList.remove('active');
        hideMsg();
    }

    function hideMsg() {
        msgDiv.style.display = 'none';
    }

    function displayMessage(text, type) {
        msgDiv.innerText = text;
        msgDiv.style.display = 'block';
        msgDiv.className = 'message ' + (type === 'error' ? 'msg-error' : 'msg-success');
    }

    signupForm.onsubmit = (e) => {
        e.preventDefault();
        const fullPhone = document.getElementById('countryCode').value + document.getElementById('phone').value;
        let users = JSON.parse(localStorage.getItem('burnup_users')) || [];
        
        if (users.some(user => user.phone === fullPhone)) {
            displayMessage("عذراً، هذا الرقم مسجل من قبل!", "error");
        } else {
            const newUser = {
                firstName: document.getElementById('firstName').value,
                phone: fullPhone,
                password: document.getElementById('password').value
            };
            users.push(newUser);
            localStorage.setItem('burnup_users', JSON.stringify(users));
            displayMessage("تم إنشاء الحساب! يمكنك الدخول الآن.", "success");
            setTimeout(showLogin, 1500); // تحويل المستخدم لصفحة الدخول بعد نجاح التسجيل
        }
    };

    loginForm.onsubmit = (e) => {
        e.preventDefault();
        const fullPhone = document.getElementById('loginCountryCode').value + document.getElementById('loginPhone').value;
        const pass = document.getElementById('loginPassword').value;
        let users = JSON.parse(localStorage.getItem('burnup_users')) || [];
        const user = users.find(u => u.phone === fullPhone && u.password === pass);

        if (user) {
            displayMessage(`أهلاً بك يا ${user.firstName}، جاري توجيهك...`, "success");
            // هنا يمكنك إضافة window.location.href لصفحة المستخدم
        } else {
            displayMessage("بيانات الدخول غير صحيحة.", "error");
        }
    };
</script>
</body>
</html>
